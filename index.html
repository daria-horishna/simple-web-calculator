<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Simple Web Calculator</title>
</head>
<body>
    <h1>Калькулятор</h1>
    <input type="number" id="num1" placeholder="Число 1">
    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
    </select>
    <input type="number" id="num2" placeholder="Число 2">
    <button id="calc-btn" onclick="calculate()">Рахувати</button>
    <p>Результат: <span id="result">0</span></p>
</body>
</html>
