name: CI/CD Pipeline # Назва автоматизованого процесу, що відображається в GitHub Actions

on: # Блок тригерів: визначає, коли саме запускати перевірку
  push: # Запуск при завантаженні нового коду в репозиторій
    branches: [ main, develop ] # Тільки для головної (main) та розробницької (develop) гілок
  pull_request: # Запуск при створенні запиту на злиття коду (Pull Request)
    branches: [ main, develop ] # Дозволяє перевірити код до того, як він потрапить в основну гілку

jobs: # Список завдань, які має виконати сервер
  build-and-test: # Назва конкретного завдання (збірка та тестування)
    runs-on: ubuntu-latest # Вибір операційної системи (найновіша версія Ubuntu Linux)

    steps: # Покрокова інструкція виконання завдання
      - name: Checkout code # Крок 1: Копіювання коду з репозиторію на віртуальну машину
        uses: actions/checkout@v4 # Використання стандартного екшену для доступу до файлів

      - name: Setup Node.js # Крок 2: Встановлення програмного середовища Node.js
        uses: actions/setup-node@v4 # Використання екшену для налаштування Node.js
        with:
          node-version: 20 # Встановлення конкретної 20-ї версії Node.js для стабільності
          cache: 'npm' # Увімкнення кешування залежностей для пришвидшення наступних запусків

      - name: Install dependencies # Крок 3: Встановлення бібліотек (пакетів) проєкту
        run: npm ci # Команда 'clean install' для встановлення пакетів суворо за файлом lock

      - name: Run Linter # Крок 4: Перевірка стилю та синтаксису коду (ESLint)
        run: npm run lint # Якщо лінтер знайде помилку, пайплайн зупиниться

      - name: Run Unit Tests # Крок 5: Запуск автоматичних математичних тестів (Vitest)
        run: npm run test:unit # Перевірка логіки калькулятора перед деплоєм