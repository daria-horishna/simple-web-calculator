name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    # 1. Визначення середовища виконання
    runs-on: ubuntu-latest

    steps:
      # 2. Отримання коду із репозиторію
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Налаштування Node.js (версія 20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Оптимізація: кешування залежностей

      # 4. Встановлення залежностей (Clean Install)
      - name: Install dependencies
        run: npm ci

      # 5. Перевірка якості коду (Linting)
      - name: Run Linter
        run: npm run lint

      # 6. Запуск модульних тестів
      - name: Run Unit Tests
        run: npm run test:unit